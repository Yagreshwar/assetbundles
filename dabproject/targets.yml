targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    presets:
      name_prefix : dev_${workspace.current_user.short_name}_
      source_linked_deployment: false
    workspace:
      host: https://dbc-28d5e9c3-54d3.cloud.databricks.com/
    variables:
      landing_path: "/Volumes/dev_lakehouse/bronze/raw_files/"
      archive_path: "/Volumes/dev_lakehouse/bronze/archive_files/"
      catalog_name: dev_lakehouse
      bronze_schema_name: bronze
      silver_schema_name: silver
      gold_schema_name: gold
  prod:
    mode: production
    workspace:
      host: https://dbc-28d5e9c3-54d3.cloud.databricks.com/
      # We explicitly deploy to /Workspace/Users/yagreshwar007@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/yagreshwar007@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      landing_path: "/Volumes/prod_lakehouse/bronze/raw_files/"
      archive_path: "/Volumes/prod_lakehouse/bronze/archive_files/"
      catalog_name: prod_lakehouse
      bronze_schema_name: bronze
      silver_schema_name: silver
      gold_schema_name: gold
    permissions:
      - group_name: admins
        level: CAN_MANAGE

